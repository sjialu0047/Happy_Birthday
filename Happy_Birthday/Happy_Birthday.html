// ============================================================
//  Circular glow texture (round particles, not squares)
// ============================================================
function createGlowTexture(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(size/2, size/2, size*0.02, size/2, size/2, size/2);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.1, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.35,'rgba(255,255,255,0.5)');
    g.addColorStop(0.65,'rgba(255,255,255,0.1)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(c);
}
const glowTex = createGlowTexture(64);

// ============================================================
//  3D CAKE PARTICLE BUILDER
// ============================================================
function addCakePoints(arr, x, y, z, r, g, b){
    arr.push({x, y, z, r, g, b});
}

function buildCakeParticles(){
    const pts = [];
    const TWO_PI = Math.PI * 2;

    // Tier 1 (bottom): r=75, h=38, yCenter=-55
    const t1r=75, t1h=38, t1y=-55;
    for(let s=0; s<2800; s++){
        const a = Math.random() * TWO_PI;
        const sideOrTop = Math.random();
        let x,y,z;
        if(sideOrTop < 0.82){
            // Side surface
            y = t1y - t1h/2 + Math.random() * t1h;
            x = Math.cos(a) * t1r; z = Math.sin(a) * t1r;
        } else {
            // Top surface
            const rr = Math.sqrt(Math.random()) * t1r;
            const aa = Math.random() * TWO_PI;
            y = t1y + t1h/2; x = Math.cos(aa) * rr; z = Math.sin(aa) * rr;
        }
        // Golden-brown gradient
        const v = 0.55 + Math.random()*0.4;
        const rc = 0.95*v, gc = 0.65*v, bc = 0.15*v;
        addCakePoints(pts, x, y, z, rc, gc, bc);
    }

    // Tier 2 (middle): r=52, h=33, yCenter=-18
    const t2r=52, t2h=33, t2y=-18;
    for(let s=0; s<2200; s++){
        const a = Math.random()*TWO_PI;
        let x,y,z;
        if(Math.random()<0.82){
            y = t2y - t2h/2 + Math.random()*t2h;
            x = Math.cos(a)*t2r; z = Math.sin(a)*t2r;
        } else {
            const rr = Math.sqrt(Math.random())*t2r;
            const aa = Math.random()*TWO_PI;
            y = t2y + t2h/2; x = Math.cos(aa)*rr; z = Math.sin(aa)*rr;
        }
        const v = 0.6 + Math.random()*0.35;
        addCakePoints(pts, x, y, z, 0.92*v, 0.72*v, 0.28*v);
    }

    // Tier 3 (top): r=33, h=28, yCenter=15
    const t3r=33, t3h=28, t3y=15;
    for(let s=0; s<1700; s++){
        const a = Math.random()*TWO_PI;
        let x,y,z;
        if(Math.random()<0.82){
            y = t3y - t3h/2 + Math.random()*t3h;
            x = Math.cos(a)*t3r; z = Math.sin(a)*t3r;
        } else {
            const rr = Math.sqrt(Math.random())*t3r;
            const aa = Math.random()*TWO_PI;
            y = t3y + t3h/2; x = Math.cos(aa)*rr; z = Math.sin(aa)*rr;
        }
        const v = 0.65 + Math.random()*0.3;
        addCakePoints(pts, x, y, z, 0.98*v, 0.82*v, 0.42*v);
    }

    // Cream / icing rings on tier edges
    for(let tier=0; tier<3; tier++){
        const cr = [75,52,33][tier];
        const cy = [-55+t1h/2, -18+t2h/2, 15+t3h/2][tier];
        for(let s=0; s<350; s++){
            const a = Math.random()*TWO_PI;
            const rr = cr + (Math.random()-0.5)*8;
            const yy = cy + (Math.random()-0.5)*5;
            const x = Math.cos(a)*rr, z = Math.sin(a)*rr;
            addCakePoints(pts, x, yy, z, 1, 0.95, 0.85); // cream white
        }
    }

    // Sprinkles — colorful dots on top surfaces
    for(let s=0; s<400; s++){
        const tierTop = [-55+t1h/2, -18+t2h/2, 15+t3h/2][Math.floor(Math.random()*3)];
        const maxR = [75,52,33][Math.floor(Math.random()*3)]*0.85;
        const rr = Math.sqrt(Math.random())*maxR;
        const aa = Math.random()*TWO_PI;
        const hue = Math.random();
        let cr,cg,cb;
        if(hue<0.25){cr=1;cg=0.3;cb=0.3;}      // red
        else if(hue<0.5){cr=0.3;cg=0.8;cb=1;}   // cyan
        else if(hue<0.7){cr=1;cg=0.8;cb=0.1;}   // yellow
        else if(hue<0.85){cr=0.5;cg=1;cb=0.3;}  // green
        else {cr=1;cg=0.4;cb=0.8;}              // pink
        addCakePoints(pts, Math.cos(aa)*rr, tierTop+2, Math.sin(aa)*rr, cr, cg, cb);
    }

    // Candle — thin cylinder above top tier center
    const candR=3, candH=28, candY=15+t3h/2+candH/2;
    for(let s=0; s<250; s++){
        const a = Math.random()*TWO_PI;
        const y = candY - candH/2 + Math.random()*candH;
        const r = candR * 0.5 + Math.random()*candR*0.5;
        addCakePoints(pts, Math.cos(a)*r, y, Math.sin(a)*r, 1, 0.9, 0.75);
    }

    return pts;
}

function buildFlameParticles(){
    const pts = [];
    // Teardrop flame shape above candle
    const flameBaseY = 20+36+18+2; // top of candle on bigger cake
    for(let s=0; s<FLAME_COUNT; s++){
        const t = Math.random();
        const h = t * 18; // flame height
        const maxR = 5 * (1-t) * (1 + 0.3*Math.sin(t*Math.PI)); // wider at bottom, point at top
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * maxR;
        const x = Math.cos(a) * r;
        const y = flameBaseY + h;
        const z = Math.sin(a) * r;
        // Color gradient: red→orange→yellow from bottom to top
        let cr, cg, cb;
        if(t < 0.3){cr=1;cg=0.15+0.3*t;cb=0;}       // deep red
        else if(t < 0.6){cr=1;cg=0.4+0.6*t;cb=0;}    // orange
        else if(t < 0.85){cr=1;cg=0.85+0.15*t;cb=0;} // yellow-orange
        else {cr=1;cg=1;cb=0.4*t;}                    // bright yellow
        pts.push({x, y, z, r:cr, g:cg, b:cb});
    }
    return pts;
}

/* =========================
   DOG IMAGE -> PARTICLES
   (step=1 on sized canvas for 1:1 particle-to-pixel coverage)
========================= */

async function loadDogParticles(){
    return new Promise((resolve)=>{
        const img = new Image();
        img.onload = ()=>{
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            // Higher alpha threshold → fewer dog pixels → need larger canvas
            const targetDim = Math.floor(Math.sqrt(particleCount * 3));
            const scale = targetDim / Math.max(img.width, img.height);
            canvas.width = Math.floor(img.width * scale);
            canvas.height = Math.floor(img.height * scale);

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const pts = [];

            // Step=1: full resolution on optimized canvas
            for(let y=0; y<canvas.height; y+=1){
                for(let x=0; x<canvas.width; x+=1){
                    const idx = (y*canvas.width+x)*4;
                    if(data[idx+3]>100){ // Only solid pixels (skip anti-alias blur)
                        pts.push({
                            x: (x - canvas.width/2) * 2.0,
                            y: (canvas.height/2 - y) * 2.0,
                            z: (Math.random()-0.5)*16,
                            r: data[idx]/255,
                            g: data[idx+1]/255,
                            b: data[idx+2]/255
                        });
                    }
                }
            }

            // Shuffle for even distribution across entire dog shape
            for(let i=pts.length-1;i>0;i--){
                const j = Math.floor(Math.random()*(i+1));
                [pts[i], pts[j]] = [pts[j], pts[i]];
            }

            console.log('Dog: canvas',canvas.width,'x',canvas.height,
                '→',pts.length,'pixels →',particleCount,'particles');

            for(let i=0;i<particleCount;i++){
                const p = pts[i % pts.length];
                targetDog[i].set(p.x, p.y, p.z);
                colors[i*3]=Math.min(p.r*1.6,1); colors[i*3+1]=Math.min(p.g*1.6,1); colors[i*3+2]=Math.min(p.b*1.6,1);
            }
            geometry.attributes.color.needsUpdate = true;
            dogColors = new Float32Array(colors); // Save for mode switching
            dogLoaded = true;
            resolve();
        };
        img.src = "dog.png";
    });
}

/* =========================
   CAKE TARGETS (into main 40K particles)
========================= */

// Scale cake to use all 40K particles
function buildCakeTargets(){
    const TWO_PI = Math.PI*2;
    const totalK = particleCount - 600; // leave room for flame

    // Tier proportions (same as before, scaled up)
    const t1 = Math.floor(totalK*0.35), t2 = Math.floor(totalK*0.27), t3 = Math.floor(totalK*0.21);
    const cream = Math.floor(totalK*0.10), sprinkles = Math.floor(totalK*0.05);
    let idx = 0;

    function setParticle(i, x, y, z, r, g, b){
        targetGalaxy[i].set(x, y, z);
        colors[i*3]=r; colors[i*3+1]=g; colors[i*3+2]=b;
    }

    // Tier 1 (bottom): r=97, h=49, yCenter=-72
    const t1r=97, t1h=49, t1y=-72;
    for(let s=0; s<t1; s++){
        const a = Math.random()*TWO_PI;
        let x,y,z;
        if(Math.random()<0.82){
            y = t1y - t1h/2 + Math.random()*t1h; x = Math.cos(a)*t1r; z = Math.sin(a)*t1r;
        } else {
            const rr = Math.sqrt(Math.random())*t1r; const aa = Math.random()*TWO_PI;
            y = t1y + t1h/2; x = Math.cos(aa)*rr; z = Math.sin(aa)*rr;
        }
        const v = 0.55+Math.random()*0.4;
        setParticle(idx++, x, y, z, 0.95*v, 0.65*v, 0.15*v);
    }

    // Tier 2: r=67, h=43, y=-24
    const t2r=67, t2h=43, t2y=-24;
    for(let s=0; s<t2; s++){
        const a = Math.random()*TWO_PI;
        let x,y,z;
        if(Math.random()<0.82){
            y = t2y - t2h/2 + Math.random()*t2h; x = Math.cos(a)*t2r; z = Math.sin(a)*t2r;
        } else {
            const rr = Math.sqrt(Math.random())*t2r; const aa = Math.random()*TWO_PI;
            y = t2y + t2h/2; x = Math.cos(aa)*rr; z = Math.sin(aa)*rr;
        }
        const v = 0.6+Math.random()*0.35;
        setParticle(idx++, x, y, z, 0.92*v, 0.72*v, 0.28*v);
    }

    // Tier 3: r=43, h=36, y=20
    const t3r=43, t3h=36, t3y=20;
    for(let s=0; s<t3; s++){
        const a = Math.random()*TWO_PI;
        let x,y,z;
        if(Math.random()<0.82){
            y = t3y - t3h/2 + Math.random()*t3h; x = Math.cos(a)*t3r; z = Math.sin(a)*t3r;
        } else {
            const rr = Math.sqrt(Math.random())*t3r; const aa = Math.random()*TWO_PI;
            y = t3y + t3h/2; x = Math.cos(aa)*rr; z = Math.sin(aa)*rr;
        }
        const v = 0.65+Math.random()*0.3;
        setParticle(idx++, x, y, z, 0.98*v, 0.82*v, 0.42*v);
    }

    // Cream rings
    for(let tier=0; tier<3; tier++){
        const cr=[97,67,43][tier], cy=[-72+t1h/2, -24+t2h/2, 20+t3h/2][tier];
        for(let s=0; s<Math.floor(cream/3); s++){
            const a = Math.random()*TWO_PI;
            const rr = cr + (Math.random()-0.5)*8, yy = cy + (Math.random()-0.5)*5;
            setParticle(idx++, Math.cos(a)*rr, yy, Math.sin(a)*rr, 1, 0.95, 0.85);
        }
    }

    // Sprinkles
    for(let s=0; s<sprinkles; s++){
        const tierTop = [-72+t1h/2, -24+t2h/2, 20+t3h/2][Math.floor(Math.random()*3)];
        const maxR = [97,67,43][Math.floor(Math.random()*3)]*0.85;
        const rr = Math.sqrt(Math.random())*maxR, aa = Math.random()*TWO_PI;
        const hue = Math.random();
        let cr,cg,cb;
        if(hue<0.25){cr=1;cg=0.3;cb=0.3;} else if(hue<0.5){cr=0.3;cg=0.8;cb=1;}
        else if(hue<0.7){cr=1;cg=0.8;cb=0.1;} else if(hue<0.85){cr=0.5;cg=1;cb=0.3;}
        else {cr=1;cg=0.4;cb=0.8;}
        setParticle(idx++, Math.cos(aa)*rr, tierTop+2, Math.sin(aa)*rr, cr, cg, cb);
    }

    // Candle
    const candR=4, candH=36, candY=20+t3h/2+candH/2;
    for(let s=0; s<250; s++){
        const a = Math.random()*TWO_PI;
        const y = candY - candH/2 + Math.random()*candH;
        const r = candR*0.5 + Math.random()*candR*0.5;
        setParticle(idx++, Math.cos(a)*r, y, Math.sin(a)*r, 1, 0.9, 0.75);
    }

    // Fill remaining with cake-colored scatter
    while(idx < particleCount){
        const r = Math.random()*105, a = Math.random()*TWO_PI;
        setParticle(idx++, Math.cos(a)*r, -72-t1h/2+Math.random()*140, Math.sin(a)*r, 0.8, 0.55, 0.2);
    }

    geometry.attributes.color.needsUpdate = true;
}

// Flame — still separate (200 particles)
function initFlame(){
    const flameData = buildFlameParticles();
    const fpos = new Float32Array(FLAME_COUNT*3);
    const fcol = new Float32Array(FLAME_COUNT*3);
    for(let i=0;i<FLAME_COUNT;i++){
        const p = flameData[i];
        fpos[i*3]=p.x; fpos[i*3+1]=p.y; fpos[i*3+2]=p.z;
        fcol[i*3]=p.r; fcol[i*3+1]=p.g; fcol[i*3+2]=p.b;
    }
    const fgeom = new THREE.BufferGeometry();
    fgeom.setAttribute('position', new THREE.BufferAttribute(fpos,3));
    fgeom.setAttribute('color', new THREE.BufferAttribute(fcol,3));
    const fmat = new THREE.PointsMaterial({
        size: 1.8, map: glowTex, vertexColors: true,
        blending: THREE.AdditiveBlending, depthWrite: false, transparent: true
    });
    flameParticles = new THREE.Points(fgeom, fmat);
    scene.add(flameParticles);
}

// Audio
async function startAudio(){
    if(audioStarted) return;
    try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
        audioCtx = new AudioContext();
        if(audioCtx.state==='suspended') await audioCtx.resume();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.2;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        audioStarted = true;
        console.log('Mic ready');
    }catch(e){
        console.warn('Mic denied:',e.message);
        label.innerText = '🎂 蛋糕 (点击后吹气)';
        const retry = ()=>{
            if(audioStarted) { document.removeEventListener('click',retry); return; }
            startAudio();
        };
        document.addEventListener('click', retry);
        setTimeout(()=>{ if(!audioStarted && currentMode===MODE.CAKE && cakePhase==='IDLE') triggerBlowOut(); }, 10000);
    }
}

function getVolume(){
    if(!analyser) return 0;
    const data = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);
    let sum = 0;
    for(let i=0;i<data.length;i++) sum += Math.abs(data[i]);
    return sum/data.length;
}

function triggerBlowOut(){
    if(cakePhase!=='IDLE') return;
    cakePhase = 'BLOW1_FLAME'; cakePhaseTime = 0;
}

function updateCakePhase(dt, time){
    if(currentMode!==MODE.CAKE) return;
    cakePhaseTime += dt;

    // Audio detection
    if(cakePhase==='IDLE' && audioStarted){
        const v = getVolume();
        if(Math.floor(time)%2===0 && Math.floor(time*1000)%2000<20){
            console.log('🎤 RMS:',v.toFixed(4),'Thr:',BLOW_THRESHOLD,'Frames:',blowFrames);
        }
        if(v>0.005 && Math.floor(time*10)%5===0){
            label.innerText = '🎂 音量:'+v.toFixed(3)+' 阈值:'+BLOW_THRESHOLD;
        }
        if(v>BLOW_THRESHOLD){
            blowFrames++;
            if(blowFrames>=BLOW_FRAMES_NEEDED){ console.log('💨 BLOW!'); triggerBlowOut(); }
        } else { blowFrames = Math.max(0, blowFrames-3); }
    }
    if(cakePhase==='IDLE' && !audioStarted && Math.floor(time)%3===0){
        label.innerText = '🎂 蛋糕 (按B键或吹气)';
    }

    // Phase 1: Flame dies (0→0.5s)
    if(cakePhase==='BLOW1_FLAME'){
        const ease = 1-Math.pow(1-Math.min(cakePhaseTime/0.5,1),3);
        if(flameParticles){
            flameParticles.material.opacity = 1-ease;
            flameParticles.scale.setScalar(1-ease*0.7);
            const fcol = flameParticles.geometry.attributes.color.array;
            for(let i=0;i<FLAME_COUNT;i++){
                fcol[i*3]=Math.max(0,fcol[i*3]-ease*0.8);
                fcol[i*3+1]=Math.max(0,fcol[i*3+1]-ease*0.6);
                fcol[i*3+2]=Math.max(0,fcol[i*3+2]-ease*0.4);
            }
            flameParticles.geometry.attributes.color.needsUpdate=true;
        }
        if(cakePhaseTime>=0.5){
            if(flameParticles){ scene.remove(flameParticles); flameParticles.geometry.dispose(); flameParticles.material.dispose(); flameParticles=null; }
            // Rebuild targets from cake → galaxy
            // Store current cake positions as starting points
            const pos = geometry.attributes.position.array;
            for(let i=0;i<particleCount;i++){
                const i3=i*3;
                pos[i3]=targetGalaxy[i].x; pos[i3+1]=targetGalaxy[i].y; pos[i3+2]=targetGalaxy[i].z;
            }
            geometry.attributes.position.needsUpdate=true;
            // Set new galaxy targets
            buildGalaxy();
            cakePhase='BLOW2_SCATTER'; cakePhaseTime=0;
        }
    }

    // Phase 2: Particles lerp from cake → galaxy (0.5→4.5s)
    if(cakePhase==='BLOW2_SCATTER'){
        const t = Math.min(cakePhaseTime/4.0, 1);
        label.innerText = t<0.6 ? '🎂 生日快乐' : '✨ 星辰';
        if(cakePhaseTime>=4.0){
            cakePhase='DONE';
            currentMode = MODE.GALAXY;
            particles.visible = true;
            material.opacity = 1.0;
        }
    }

    // Once cake is done, ensure galaxy targets are set
    if(cakePhase==='DONE'){
        label.innerText = '✨ 星辰';
    }
}

/* =========================
   GALAXY TARGET — multi-layer cosmic distribution
   Layers: dense core → spiral arms → halo → background field
========================= */

function buildGalaxy(){
    for(let i=0;i<particleCount;i++){
        const r = Math.random();
        let x, y, z;

        if(r < 0.18){
            // 🔵 DENSE ELLIPTICAL CORE — exponential brightness falloff
            const coreR = Math.pow(Math.random(), 1.8) * 200;
            const coreA = Math.random() * Math.PI * 2;
            x = Math.cos(coreA) * coreR;
            z = Math.sin(coreA) * coreR * 0.35; // flattened disk
            y = (Math.random() - 0.5) * 25 * Math.exp(-coreR / 120);

        } else if(r < 0.58){
            // 🌌 3 SPIRAL ARMS — logarithmic with increasing scatter
            const armR = 40 + Math.pow(Math.random(), 0.7) * 560;
            const armIdx = Math.floor(Math.random() * 3);
            const baseAngle = armIdx * (Math.PI * 2 / 3) + 0.3; // offset for natural look
            const twist = armR * 0.022; // logarithmic spiral
            const scatter = (Math.random() - 0.5) * 0.6 * (0.5 + armR / 250);
            const a = baseAngle + twist + scatter;
            x = Math.cos(a) * armR;
            z = Math.sin(a) * armR;
            y = (Math.random() - 0.5) * 35 * (1 - armR / 620);
            // Add slight arm bifurcation
            if(Math.random() < 0.2){
                x += (Math.random() - 0.5) * armR * 0.15;
                z += (Math.random() - 0.5) * armR * 0.15;
            }

        } else if(r < 0.80){
            // ✨ STELLAR HALO — sparse spherical cloud
            const haloR = 120 + Math.random() * 480;
            const haloA = Math.random() * Math.PI * 2;
            const haloH = (Math.random() - 0.5) * 160;
            x = Math.cos(haloA) * haloR;
            z = Math.sin(haloA) * haloR;
            y = haloH;

        } else if(r < 0.94){
            // ⭐ BRIGHT STAR CLUSTERS — small dense groups
            const clusterIdx = Math.floor(Math.random() * 5);
            const clusterCX = (Math.random() - 0.5) * 400;
            const clusterCY = (Math.random() - 0.5) * 100;
            const clusterCZ = (Math.random() - 0.5) * 400;
            const localR = Math.pow(Math.random(), 2) * 60;
            const localA = Math.random() * Math.PI * 2;
            const localH = (Math.random() - 0.5) * 25;
            x = clusterCX + Math.cos(localA) * localR;
            y = clusterCY + localH;
            z = clusterCZ + Math.sin(localA) * localR;

        } else {
            // 🌠 DEEP BACKGROUND FIELD — scattered across space
            x = (Math.random() - 0.5) * 1400;
            y = (Math.random() - 0.5) * 900;
            z = (Math.random() - 0.5) * 900;
        }

        targetGalaxy[i].set(x, y, z);

        // 🌈 Star color by temperature / position
        const temp = Math.random();
        const dist = Math.sqrt(x*x + z*z);
        if(dist < 80){
            // Core: warm golden glow
            if(temp < 0.6){ colors[i*3]=1.0; colors[i*3+1]=0.85; colors[i*3+2]=0.5; }
            else { colors[i*3]=1.0; colors[i*3+1]=0.95; colors[i*3+2]=0.7; }
        } else if(dist < 250){
            // Inner disk: mix of white and blue-white
            if(temp < 0.3){ colors[i*3]=0.7; colors[i*3+1]=0.8; colors[i*3+2]=1.0; }
            else if(temp < 0.7){ colors[i*3]=1.0; colors[i*3+1]=1.0; colors[i*3+2]=1.0; }
            else { colors[i*3]=1.0; colors[i*3+1]=0.9; colors[i*3+2]=0.65; }
        } else {
            // Outer regions: cooler, varied
            if(temp < 0.2){ colors[i*3]=0.55; colors[i*3+1]=0.7; colors[i*3+2]=1.0; }
            else if(temp < 0.5){ colors[i*3]=1.0; colors[i*3+1]=1.0; colors[i*3+2]=1.0; }
            else if(temp < 0.7){ colors[i*3]=1.0; colors[i*3+1]=0.75; colors[i*3+2]=0.45; }
            else if(temp < 0.9){ colors[i*3]=0.85; colors[i*3+1]=0.9; colors[i*3+2]=1.0; }
            else { colors[i*3]=0.7; colors[i*3+1]=0.6; colors[i*3+2]=1.0; } // rare purple
        }
    }
    geometry.attributes.color.needsUpdate = true;
}

/* =========================
   BIRTHDAY TEXT  (FIXED: RGB brightness check, denser sampling)
========================= */

function buildBirthday(){
    const canvas = document.createElement("canvas");
    canvas.width = 1400;
    canvas.height = 400;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font = "bold 170px Arial";
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.fillText("Happy Birthday", canvas.width/2, 230);

    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const pts = [];

    // Step=3: denser than before (was step=4), gives ~2x more text particles
    for(let y=0;y<canvas.height;y+=3){
        for(let x=0;x<canvas.width;x+=3){
            const idx = (y*canvas.width+x)*4;
            // Check RGB brightness, NOT alpha (black bg and white text both have alpha=255)
            const brightness = data[idx] + data[idx+1] + data[idx+2];
            if(brightness > 384){
                pts.push({
                    x: (x - canvas.width/2) * 0.7,
                    y: (canvas.height/2 - y) * 0.7
                });
            }
        }
    }

    console.log('Birthday text points:', pts.length);

    for(let i=0;i<particleCount;i++){
        const p = pts[i % pts.length];
        targetBirthday[i].set(p.x, p.y, (Math.random()-0.5)*40);
        // Bright celebratory colors
        const rnd = Math.random();
        if(rnd<0.4){
            colors[i*3]=1.0; colors[i*3+1]=1.0; colors[i*3+2]=0.6;  // bright yellow
        }else if(rnd<0.7){
            colors[i*3]=1.0; colors[i*3+1]=0.5; colors[i*3+2]=0.7;  // hot pink
        }else if(rnd<0.9){
            colors[i*3]=0.5; colors[i*3+1]=0.9; colors[i*3+2]=1.0;  // sky blue
        }else{
            colors[i*3]=1.0; colors[i*3+1]=1.0; colors[i*3+2]=1.0;  // pure white
        }
    }
    geometry.attributes.color.needsUpdate = true;
}

/* =========================
   CONFETTI
========================= */

function createConfetti(){
    confettiGroup.clear();
    for(let i=0;i<350;i++){
        const geo = new THREE.PlaneGeometry(5,8);
        const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(Math.random(),Math.random(),Math.random()),
            side: THREE.DoubleSide
        });
        const m = new THREE.Mesh(geo,mat);
        m.position.set(
            (Math.random()-0.5)*900,
            Math.random()*500-100,
            (Math.random()-0.5)*400
        );
        m.userData.speed = 0.5+Math.random()*2;
        confettiGroup.add(m);
    }
}

function createFireworks(){
    fireworksGroup.clear();

    // Gold / warm-white firework bursts — distinct from rainbow confetti
    const burstColors = [
        new THREE.Color('#ffd700'), // gold
        new THREE.Color('#fff4b0'), // light gold
        new THREE.Color('#ffe4b5'), // moccasin
        new THREE.Color('#fff8dc'), // cornsilk
        new THREE.Color('#ffcc00'), // amber gold
    ];

    for(let k=0;k<12;k++){
        const group = new THREE.Group();

        // Central glow core
        const coreGeom = new THREE.SphereGeometry(4, 12, 8);
        const coreColor = burstColors[k % burstColors.length];
        const coreMat = new THREE.MeshBasicMaterial({ color: coreColor });
        group.add(new THREE.Mesh(coreGeom, coreMat));

        // Radiating burst particles (line segments for sparkle effect)
        const rayCount = 60;
        for(let r=0;r<rayCount;r++){
            const angle = (r/rayCount)*Math.PI*2;
            const tilt = (Math.random()-0.5)*0.8;
            const rayLen = 30+Math.random()*60;

            const rayGeo = new THREE.BufferGeometry();
            const rayPos = new Float32Array(6); // 2 points per line
            rayPos[0]=0; rayPos[1]=0; rayPos[2]=0;
            rayPos[3]=Math.cos(angle)*rayLen*0.3; rayPos[4]=tilt*rayLen; rayPos[5]=Math.sin(angle)*rayLen*0.3;
            rayGeo.setAttribute('position', new THREE.BufferAttribute(rayPos,3));

            const rayMat = new THREE.LineBasicMaterial({
                color: coreColor,
                transparent: true,
                opacity: 0.7
            });
            const ray = new THREE.Line(rayGeo, rayMat);
            ray.userData = { baseLen: rayLen, angle, tilt, phase: Math.random()*Math.PI*2 };
            group.add(ray);
        }

        // Sparkle dots around the burst
        const sparkCount = 80;
        const sparkGeo = new THREE.BufferGeometry();
        const sparkPos = new Float32Array(sparkCount*3);
        for(let s=0;s<sparkCount;s++){
            const a = Math.random()*Math.PI*2;
            const p = Math.random()*Math.PI;
            const rad = 8+Math.random()*20;
            sparkPos[s*3]   = Math.sin(p)*Math.cos(a)*rad;
            sparkPos[s*3+1] = Math.cos(p)*rad;
            sparkPos[s*3+2] = Math.sin(p)*Math.sin(a)*rad;
        }
        sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos,3));
        const sparkMat = new THREE.PointsMaterial({
            size: 1.8,
            map: glowTex,
            color: coreColor,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });
        const sparks = new THREE.Points(sparkGeo, sparkMat);
        sparks.userData = { basePositions: new Float32Array(sparkPos) };
        group.add(sparks);

        // Position in upper half of screen
        group.position.set(
            (Math.random()-0.5)*700,
            80+Math.random()*280,
            (Math.random()-0.5)*350
        );
        group.userData = {
            sparks,
            baseScale: 0.6+Math.random()*1.2,
            pulseSpeed: 0.5+Math.random()*1.5,
            sparkPositions: sparks.userData.basePositions
        };

        fireworksGroup.add(group);
    }
}

/* =========================
   HANDS — fixed gesture detection
========================= */

let handLandmarker;
let video;
let lastGesture = "";
let handPos = new THREE.Vector3();

async function initHands(){
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions:{
            modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        runningMode:"VIDEO",
        numHands:1
    });

    video = document.createElement("video");
    const stream = await navigator.mediaDevices.getUserMedia({ video:true });
    video.srcObject = stream;
    await video.play();
    detectHands();
}

function detectGesture(lm){
    // Check if each finger tip is ABOVE its PIP joint (extended = yes)
    const indexUp  = lm[8].y  < lm[6].y;
    const middleUp = lm[12].y < lm[10].y;
    const ringUp   = lm[16].y < lm[14].y;
    const pinkyUp  = lm[20].y < lm[18].y;

    // Thumb: tip farther from wrist than IP joint
    const wrist = lm[0];
    const thumbTipDist = Math.hypot(lm[4].x-wrist.x, lm[4].y-wrist.y);
    const thumbIpDist  = Math.hypot(lm[3].x-wrist.x, lm[3].y-wrist.y);
    const thumbUp = thumbTipDist > thumbIpDist * 1.05;

    const extended = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

    // ✌ Scissors: index + middle extended, ring + pinky folded
    if (indexUp && middleUp && !ringUp && !pinkyUp) return 'SCISSORS';

    // ✋ Open palm: all 4 extended + thumb out
    if (extended >= 4 && thumbUp) return 'OPEN';

    // ✊ Fist: all fingers folded
    if (extended === 0 && !thumbUp) return 'FIST';

    return null;
}

function detectHands(){
    if(video.readyState>=2){
        const result = handLandmarker.detectForVideo(video, performance.now());

        if(result.landmarks.length){
            const lm = result.landmarks[0];

            // Track PALM CENTER (midpoint between wrist and middle MCP) for stability
            const palmX = (lm[0].x + lm[9].x) / 2;
            const palmY = (lm[0].y + lm[9].y) / 2;
            handPos.set(
                (palmX - 0.5) * 700,
                (0.5 - palmY) * 500,
                0
            );

            // CRITICAL: don't change modes while cake is active
            if(currentMode === MODE.CAKE) {
                requestAnimationFrame(detectHands);
                return;
            }

            const gesture = detectGesture(lm);

            if(gesture === 'SCISSORS'){
                setMode(MODE.BIRTHDAY);
            }else if(gesture === 'FIST'){
                setMode(MODE.DOG);
            }else if(gesture === 'OPEN'){
                setMode(MODE.GALAXY);
                lastGesture = "OPEN";
            }else{
                // Unknown gesture → stay in current mode
            }
        }else{
            // No hand — but don't leave CAKE mode
            if(currentMode !== MODE.CAKE) setMode(MODE.GALAXY);
        }
    }
    requestAnimationFrame(detectHands);
}

/* =========================
   MODE  (FIXED: clear confetti on exit)
========================= */

function setMode(m){
    if(currentMode===m) return;
    const prev = currentMode;
    currentMode = m;

    // Clear confetti when EXITING birthday mode
    if(prev === MODE.BIRTHDAY && m !== MODE.BIRTHDAY){
        confettiGroup.clear();
    }

    particles.rotation.y = 0;
    particles.visible = true;

    if(m===MODE.CAKE){
        label.innerText = "🎂 生日蛋糕";
    }else if(m===MODE.DOG){
        label.innerText = "模式：🐕 美美";
        if(dogColors){ colors.set(dogColors); geometry.attributes.color.needsUpdate = true; }
    }else if(m===MODE.BIRTHDAY){
        label.innerText = "模式：🎂 生日快乐";
        createConfetti();
    }else{
        label.innerText = "✨ 星辰";
        buildGalaxy();
    }
}

/* =========================
   ANIMATE  (FIXED: only animate confetti in birthday mode)
========================= */

function animate(){
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.1);
    const time = performance.now() * 0.001;

    // ---- Cake phase (blow detection) ----
    updateCakePhase(dt, time);

    // ---- Flame flicker ----
    if(flameParticles && cakePhase==='IDLE'){
        const fcol = flameParticles.geometry.attributes.color.array;
        for(let i=0;i<FLAME_COUNT;i++){
            const flicker = 0.7+Math.random()*0.3;
            fcol[i*3]=1.0*flicker; fcol[i*3+1]=(0.3+Math.random()*0.5)*flicker; fcol[i*3+2]=Math.random()*0.1*flicker;
        }
        flameParticles.geometry.attributes.color.needsUpdate=true;
        flameParticles.scale.setScalar(0.9+Math.sin(time*15)*0.1+Math.random()*0.05);
    }

    const pos = geometry.attributes.position.array;

    // Main particles always lerp (cake IS the galaxy system)
    for(let i=0;i<particleCount;i++){
        let target;
        if(currentMode===MODE.DOG){
            target = targetDog[i];
        }else if(currentMode===MODE.BIRTHDAY){
            target = targetBirthday[i];
        }else{
            target = targetGalaxy[i];
        }

        const idx = i*3;
        const speed = (currentMode===MODE.CAKE && cakePhase==='IDLE') ? 0.02 : 0.05;
        pos[idx]   += (target.x-pos[idx])*speed;
        pos[idx+1] += (target.y-pos[idx+1])*speed;
        pos[idx+2] += (target.z-pos[idx+2])*speed;

        if(currentMode===MODE.GALAXY){
            const dx = handPos.x-pos[idx], dy = handPos.y-pos[idx+1];
            const dist = Math.sqrt(dx*dx+dy*dy);
            if(dist<250){
                if(lastGesture==="FIST"){
                    const force = 0.06*(1-dist/250);
                    pos[idx]+=dx*force; pos[idx+1]+=dy*force;
                }else{
                    const force = 0.04*(1-dist/250);
                    pos[idx]-=dx*force; pos[idx+1]-=dy*force;
                }
            }
        }
    }
    geometry.attributes.position.needsUpdate=true;

    if(currentMode===MODE.BIRTHDAY){
        confettiGroup.children.forEach(m=>{
            m.position.y-=m.userData.speed; m.rotation.x+=0.05; m.rotation.y+=0.04;
            if(m.position.y<-400) m.position.y=400;
        });
    }

    particles.rotation.y += 0.0015;
    renderer.render(scene,camera);
}
